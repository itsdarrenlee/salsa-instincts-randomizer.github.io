---
layout: null
---
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>{{ site.title }} | Randomizer</title>
    <link rel="stylesheet" href="{{ '/assets/site.css' | relative_url }}">
</head>
<body>
    <main class="page-shell page-shell--narrow">
        <nav class="site-nav" aria-label="Site">
            <a href="{{ '/' | relative_url }}" aria-current="page">Randomizer</a>
            <a href="{{ '/challenge.html' | relative_url }}">Challenge</a>
            <a href="{{ '/figures.html' | relative_url }}">Figure reference</a>
        </nav>

        <header class="hero">
            <p class="eyebrow">Salsa Instincts</p>
            <h1>Random Pair Practice</h1>
            <p class="hero-copy">Draw two figures at a time from the shared catalog, then tap through the deck until the cycle resets.</p>
        </header>

        <section class="panel">
            <div class="pair">
                <div class="card" id="card1">—</div>
                <div class="card" id="card2">—</div>
            </div>

            <div class="button-row">
                <button class="done-btn" id="doneBtn">Done / Next pair</button>
                <button class="restart-btn" id="restartBtn">Reshuffle &amp; start over</button>
            </div>

            <p class="info" id="remainingInfo"></p>
        </section>
    </main>

    <script>
        const figureGroups = {{ site.data.figures | jsonify }};
        const allMoves = figureGroups.flatMap((group) => group.figures.map((figure) => figure.name));

        if (allMoves.length === 0) {
            throw new Error("No figures found in _data/figures.yml");
        }

        let deck = [];
        let currentPair = [];

        const card1El = document.getElementById("card1");
        const card2El = document.getElementById("card2");
        const doneBtn = document.getElementById("doneBtn");
        const restartBtn = document.getElementById("restartBtn");
        const remainingInfo = document.getElementById("remainingInfo");

        function shuffleArray(items) {
            const shuffled = [...items];

            for (let index = shuffled.length - 1; index > 0; index -= 1) {
                const swapIndex = Math.floor(Math.random() * (index + 1));
                [shuffled[index], shuffled[swapIndex]] = [shuffled[swapIndex], shuffled[index]];
            }

            return shuffled;
        }

        function getRandomPartner(excludedMove) {
            const candidates = allMoves.filter((move) => move !== excludedMove);
            const partnerPool = candidates.length > 0 ? candidates : allMoves;
            const randomIndex = Math.floor(Math.random() * partnerPool.length);
            return partnerPool[randomIndex];
        }

        function fullReset() {
            deck = shuffleArray(allMoves);
            currentPair = [];
            showNextPair();
        }

        function showNextPair() {
            if (deck.length >= 2) {
                currentPair = deck.splice(0, 2);
            } else if (deck.length === 1) {
                const finalMove = deck.pop();
                currentPair = [finalMove, getRandomPartner(finalMove)];
            } else {
                remainingInfo.textContent = "Cycle complete! Reshuffling...";

                setTimeout(() => {
                    fullReset();
                }, 800);

                return;
            }

            renderPair();
            updateRemainingInfo();
        }

        function renderPair() {
            const cards = [
                [card1El, currentPair[0]],
                [card2El, currentPair[1]]
            ];

            cards.forEach(([element, move]) => {
                if (move) {
                    element.textContent = move;
                    element.style.display = "flex";
                } else {
                    element.textContent = "";
                    element.style.display = "none";
                }
            });
        }

        function discardAndNext() {
            showNextPair();
        }

        function updateRemainingInfo() {
            remainingInfo.textContent = `${deck.length} figure(s) left in this cycle | ${allMoves.length} total`;
        }

        doneBtn.addEventListener("click", discardAndNext);
        restartBtn.addEventListener("click", fullReset);

        fullReset();
    </script>
</body>
</html>
